<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인사과 업무 통합 대시보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#44546E;--navy-light:#E8ECF0;--navy-mid:#8FA0B5;
  --lime:#A5D861;--lime-light:#EEF7DC;--lime-dark:#5C8A1E;
  --amber:#F5A623;--amber-light:#FEF3DC;
  --coral:#E05A3A;--coral-light:#FDEEE9;
  --gray:#6B7280;--gray-light:#F3F4F6;--gray-border:#E5E7EB;
  --white:#fff;--text:#1F2937;--text-muted:#6B7280;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);background:#F0F2F5;min-height:100vh}
.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:60px 1fr;min-height:100vh}
.topbar{grid-column:1/-1;background:var(--navy);display:flex;align-items:center;padding:0 1.5rem;gap:1rem}
.topbar-logo{color:var(--lime);font-size:16px;font-weight:700}
.topbar-sub{color:var(--navy-mid);font-size:12px}
.topbar-date{margin-left:auto;color:var(--navy-mid);font-size:12px}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:1rem}
.topbar-staff{display:flex;gap:5px}
.t-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;border:2px solid rgba(255,255,255,.2)}
.sync-btn{font-size:11px;padding:3px 12px;border-radius:20px;border:1px solid rgba(165,216,97,.4);background:rgba(165,216,97,.15);color:var(--lime);cursor:pointer;font-family:inherit}
.sidebar{background:var(--white);border-right:1px solid var(--gray-border);padding:1rem 0;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-section{padding:.5rem 1rem .25rem;font-size:10px;font-weight:700;color:var(--navy-mid);letter-spacing:.5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:.55rem 1rem;cursor:pointer;font-size:13px;color:var(--text-muted);border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:var(--gray-light)}
.nav-item.active{background:var(--navy-light);color:var(--navy);font-weight:500;border-left-color:var(--navy)}
.nav-icon{font-size:14px;width:18px;text-align:center}
.nav-badge{margin-left:auto;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;background:var(--coral)}
.nav-divider{height:1px;background:var(--gray-border);margin:.5rem 1rem}
.member-nav{display:flex;align-items:center;gap:7px;padding:.45rem 1rem;cursor:pointer;font-size:12px;color:var(--text-muted);border-left:3px solid transparent}
.member-nav:hover{background:var(--gray-light)}
.member-nav.active{background:var(--navy-light);color:var(--navy);border-left-color:var(--navy)}
.main{padding:1.5rem;overflow-y:auto;display:flex;flex-direction:column;gap:1rem}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--white);border-radius:var(--radius-lg);padding:1rem 1.25rem;border:.5px solid var(--gray-border);display:flex;align-items:center;gap:12px}
.stat-icon{width:40px;height:40px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:18px}
.stat-icon.blue{background:var(--navy-light)}.stat-icon.green{background:var(--lime-light)}
.stat-icon.amber{background:var(--amber-light)}.stat-icon.coral{background:var(--coral-light)}
.stat-label{font-size:11px;color:var(--text-muted);margin-bottom:2px}
.stat-val{font-size:22px;font-weight:700;line-height:1}
.stat-val.blue{color:var(--navy)}.stat-val.green{color:var(--lime-dark)}
.stat-val.amber{color:#B45309}.stat-val.coral{color:var(--coral)}
.card{background:var(--white);border-radius:var(--radius-lg);border:.5px solid var(--gray-border);overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;border-bottom:1px solid var(--gray-border)}
.card-title{font-size:14px;font-weight:700;color:var(--navy)}
.card-actions{display:flex;gap:6px;align-items:center}
.btn{font-size:12px;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--gray-border);background:var(--white);cursor:pointer;color:var(--text-muted);font-family:inherit}
.btn:hover{background:var(--gray-light)}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.lime{background:var(--lime);color:var(--lime-dark);border-color:var(--lime);font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:.6rem 1rem;text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);background:var(--gray-light);border-bottom:1px solid var(--gray-border)}
tbody td{padding:.65rem 1rem;border-bottom:.5px solid var(--gray-border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#FAFBFC}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;display:inline-block}
.badge.진행{background:#DBEAFE;color:#1E40AF}.badge.진행::before{background:#3B82F6}
.badge.완료{background:var(--lime-light);color:var(--lime-dark)}.badge.완료::before{background:var(--lime)}
.badge.대기{background:var(--gray-light);color:var(--gray)}.badge.대기::before{background:#9CA3AF}
.badge.피드백{background:#FCE7F3;color:#9D174D}.badge.피드백::before{background:#EC4899}
.badge.보류{background:var(--amber-light);color:#92400E}.badge.보류::before{background:var(--amber)}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-bar{background:var(--gray-light);border-radius:20px;height:6px;flex:1;overflow:hidden;min-width:60px}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--navy),#6B8FBF)}
.prog-fill.done{background:linear-gradient(90deg,var(--lime-dark),var(--lime))}
.prog-pct{font-size:12px;font-weight:600;color:var(--navy);min-width:30px}
.mdot{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.mdot-c{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.action-btns{display:flex;gap:4px;align-items:center}
.edit-btn{font-size:11px;padding:2px 7px;border-radius:4px;border:1px solid var(--gray-border);background:var(--white);cursor:pointer;color:var(--navy)}
.del-btn{font-size:11px;padding:2px 7px;border-radius:4px;border:1px solid #FECACA;background:#FEE2E2;cursor:pointer;color:#991B1B}
.cal-header-days{display:grid;grid-template-columns:repeat(7,1fr);padding:.5rem 1rem 0;gap:4px}
.cal-header-days span{text-align:center;font-size:11px;font-weight:600;color:var(--text-muted);padding:.25rem 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:.75rem 1rem}
.cal-day{min-height:70px;border:.5px solid var(--gray-border);border-radius:var(--radius);padding:4px 6px;background:var(--white)}
.cal-day.other-month{background:var(--gray-light);opacity:.5}
.cal-day.today{border:1.5px solid var(--navy);background:var(--navy-light)}
.cal-day.today .day-num{color:var(--navy);font-weight:700}
.day-num{font-size:12px;margin-bottom:3px;font-weight:500}
.cal-evt{font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.cal-evt.진행{background:#DBEAFE;color:#1E40AF}
.cal-evt.완료{background:var(--lime-light);color:var(--lime-dark)}
.cal-evt.대기{background:var(--gray-light);color:var(--gray)}
.cal-evt.휴가{background:#FEF3DC;color:#92400E}
.gantt-wrap{overflow-x:auto;padding:1rem}
.gantt-row{display:flex;align-items:center;min-height:36px;border-bottom:.5px solid var(--gray-border)}
.gantt-row:last-child{border-bottom:none}
.g-bar{position:absolute;height:14px;top:3px;border-radius:4px;opacity:.85}
.g-today{position:absolute;top:0;bottom:0;width:1.5px;background:#EF4444;z-index:5}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius-lg);padding:1.5rem;width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,.15)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1.25rem;color:var(--navy)}
.field{margin-bottom:.875rem}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.field input,.field select,.field textarea{width:100%;padding:.5rem .75rem;border:1px solid var(--gray-border);border-radius:var(--radius);font-size:13px;font-family:inherit;color:var(--text);outline:none}
.field textarea{height:70px;resize:vertical}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--gray-border)}
.member-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:1.25rem}
.member-card{border:.5px solid var(--gray-border);border-radius:var(--radius-lg);padding:1rem;display:flex;align-items:center;gap:10px}
.member-big-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.sm-btn{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid var(--gray-border);background:var(--white);cursor:pointer;font-family:inherit;color:var(--text-muted)}
.sm-btn.del{border-color:#FECACA;background:#FEE2E2;color:#991B1B}
.add-member-card{border:1.5px dashed var(--gray-border);border-radius:var(--radius-lg);padding:1rem;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--text-muted);font-size:13px}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.color-dot.selected{border-color:var(--navy);transform:scale(1.15)}
.pane{display:none}.pane.active{display:flex;flex-direction:column;gap:1rem}
.week-meta{display:flex;gap:1rem;padding:.6rem 1.25rem;background:var(--navy-light);font-size:12px;color:var(--navy)}
.empty{text-align:center;padding:2rem;color:var(--text-muted);font-size:13px}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:1rem 1.25rem}
.summary-card{border-radius:var(--radius);padding:.75rem 1rem;text-align:center}
/* 프로젝트 단계 집계 */
.stage-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:.75rem 1.25rem;border-top:1px solid var(--gray-border)}
.stage-card{border-radius:var(--radius);padding:.6rem .75rem;text-align:center;font-size:12px}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div><div class="topbar-logo">서울재활병원 인사과</div><div class="topbar-sub">업무 통합 관리 시스템</div></div>
  <div class="topbar-right">
    <div class="topbar-staff" id="topbar-staff"></div>
    <button class="sync-btn" id="sync-btn" onclick="syncAll()">● 동기화</button>
  </div>
  <div class="topbar-date" id="today-label"></div>
</div>
<nav class="sidebar">
  <div class="nav-section">업무 현황</div>
  <div class="nav-item active" onclick="switchNav('daily',this)"><span class="nav-icon">📋</span>일일 업무<span class="nav-badge" id="badge-daily">0</span></div>
  <div class="nav-item" onclick="switchNav('weekly',this)"><span class="nav-icon">📊</span>주간 보고</div>
  <div class="nav-item" onclick="switchNav('project',this)"><span class="nav-icon">🗂️</span>프로젝트</div>
  <div class="nav-item" onclick="switchNav('calendar',this)"><span class="nav-icon">📅</span>캘린더</div>
  <div class="nav-divider"></div>
  <div class="nav-item" onclick="switchNav('settings',this)"><span class="nav-icon">⚙️</span>설정</div>
  <div class="nav-divider"></div>
  <div class="nav-section">담당자별</div>
  <div id="member-nav-list"></div>
</nav>
<main class="main">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-icon blue">📋</div><div><div class="stat-label">전체 업무</div><div class="stat-val blue" id="s-total">0</div></div></div>
    <div class="stat-card"><div class="stat-icon amber">⏳</div><div><div class="stat-label">진행 중</div><div class="stat-val amber" id="s-prog">0</div></div></div>
    <div class="stat-card"><div class="stat-icon coral">🔔</div><div><div class="stat-label">오늘 마감</div><div class="stat-val coral" id="s-due">0</div></div></div>
    <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-label">완료</div><div class="stat-val green" id="s-done">0</div></div></div>
  </div>

  <!-- 일일업무 -->
  <div id="pane-daily" class="pane active">
    <div class="card">
      <div class="card-head"><span class="card-title">일일 업무</span>
        <div class="card-actions">
          <select id="filter-member" onchange="renderDaily()" style="font-size:12px;padding:4px 8px;border:1px solid var(--gray-border);border-radius:var(--radius)"><option value="">전체 담당자</option></select>
          <select id="filter-status" onchange="renderDaily()" style="font-size:12px;padding:4px 8px;border:1px solid var(--gray-border);border-radius:var(--radius)"><option value="">전체 상태</option><option>진행</option><option>완료</option><option>대기</option><option>피드백</option><option>보류</option></select>
          <button class="btn" onclick="deleteSelected()" style="color:#991B1B;border-color:#FECACA;background:#FEE2E2">🗑️ 선택 삭제</button>
          <button class="btn lime" onclick="openForm('daily')">+ 업무 추가</button>
        </div>
      </div>
      <table><thead><tr>
        <th style="width:36px"><input type="checkbox" id="check-all" onchange="toggleAllCheck(this)" style="cursor:pointer"></th>
        <th>업무 내용</th><th>담당자</th><th>시작일</th><th>마감일</th><th>상태</th><th>비고</th><th>관리</th>
      </tr></thead>
      <tbody id="daily-tbody"></tbody></table>
    </div>
  </div>

  <!-- 주간보고 -->
  <div id="pane-weekly" class="pane">
    <div class="card" style="margin-bottom:12px">
      <div class="card-head"><span class="card-title">주간 업무 보고</span>
        <div class="card-actions">
          <select id="week-select" onchange="renderWeekly()" style="font-size:12px;padding:4px 8px;border:1px solid var(--gray-border);border-radius:var(--radius)"></select>
          <select id="filter-weekly-member" onchange="renderWeekly()" style="font-size:12px;padding:4px 8px;border:1px solid var(--gray-border);border-radius:var(--radius)"><option value="">전체 담당자</option></select>
        </div>
      </div>
      <div class="week-meta">
        <span>📌 재직인원: <strong id="headcount-display">266</strong>명</span>
        <span>💡 일일업무에서 자동 집계</span>
      </div>
      <div style="padding:.75rem 1.25rem;border-top:1px solid var(--gray-border)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
          <span style="font-size:12px;font-weight:700;color:var(--navy)">🏖️ 이번 주 휴가</span>
          <button class="btn lime" onclick="openLeaveForm()" style="font-size:11px;padding:3px 10px">+ 휴가 등록</button>
        </div>
        <div id="leave-list" style="display:flex;flex-wrap:wrap;gap:6px"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">업무 상세</span>
        <button class="btn lime" onclick="openForm('daily')">+ 업무 추가</button>
      </div>
      <table><thead><tr><th>담당자</th><th>업무 내용</th><th>마감일</th><th>상태</th><th>비고</th><th>피드백</th></tr></thead>
      <tbody id="weekly-tbody"></tbody></table>
    </div>
    <div class="card">
      <div class="card-head">
        <span class="card-title">📝 회의 메모</span>
        <div class="card-actions">
          <span style="font-size:11px;color:var(--text-muted)" id="memo-save-status"></span>
          <button class="btn primary" onclick="saveMemo()">저장</button>
        </div>
      </div>
      <div style="padding:1rem 1.25rem">
        <textarea id="meeting-memo" placeholder="회의 중 나온 내용, 추가 논의사항 등을 자유롭게 메모하세요..." style="width:100%;height:200px;padding:.75rem;border:1px solid var(--gray-border);border-radius:var(--radius);font-size:13px;font-family:inherit;resize:vertical;line-height:1.6;outline:none"></textarea>
      </div>
    </div>
  </div>

  <!-- 프로젝트 -->
  <div id="pane-project" class="pane">
    <div class="card">
      <div class="card-head"><span class="card-title">프로젝트 현황</span>
        <div class="card-actions">
          <select id="filter-proj-member" onchange="renderProject()" style="font-size:12px;padding:4px 8px;border:1px solid var(--gray-border);border-radius:var(--radius)"><option value="">전체 담당자</option></select>
          <select id="filter-proj-status" onchange="renderProject()" style="font-size:12px;padding:4px 8px;border:1px solid var(--gray-border);border-radius:var(--radius)"><option value="">전체 상태</option><option>진행</option><option>완료</option><option>대기</option></select>
          <button class="btn lime" onclick="openForm('project')">+ 프로젝트 추가</button>
        </div>
      </div>
      <div id="project-list" style="padding:.75rem 1rem;display:flex;flex-direction:column;gap:8px"></div>
    </div></div>
  </div>

  <!-- 캘린더 -->
  <div id="pane-calendar" class="pane">
    <div class="card">
      <div class="card-head"><span class="card-title" id="cal-month-label"></span>
        <div class="card-actions"><button class="btn" onclick="changeMonth(-1)">◀ 이전</button><button class="btn" onclick="changeMonth(1)">다음 ▶</button></div>
      </div>
      <div class="cal-header-days"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- 설정 -->
  <div id="pane-settings" class="pane">
    <div class="card" style="margin-bottom:12px">
      <div class="card-head"><span class="card-title">기본 설정</span></div>
      <div style="padding:1rem 1.25rem;display:flex;align-items:center;gap:12px">
        <label style="font-size:13px;font-weight:600;color:var(--navy);min-width:80px">재직인원 수</label>
        <input type="number" id="headcount-input" value="266" style="width:100px;padding:.4rem .75rem;border:1px solid var(--gray-border);border-radius:var(--radius);font-size:13px;font-family:inherit">
        <span style="font-size:13px;color:var(--text-muted)">명</span>
        <button class="btn primary" onclick="saveHeadcount()">저장</button>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">팀원 관리</span><button class="btn lime" onclick="openAddMember()">+ 팀원 추가</button></div>
      <div class="member-grid" id="member-grid"></div>
    </div>
  </div>
</main>
</div>

<!-- 업무 추가/수정 모달 -->
<div class="overlay" id="overlay" onclick="closeOverlayOutside(event)">
  <div class="modal">
    <h3 id="modal-title">업무 추가</h3>
    <div class="field"><label>담당자</label><select id="f-member"></select></div>
    <div class="field"><label>업무 내용</label><textarea id="f-content" placeholder="업무 내용을 입력하세요"></textarea></div>
    <div class="field" id="field-created"><label>시작일</label><input type="date" id="f-created"></div>
    <div class="field" id="field-start" style="display:none"><label>시작일</label><input type="date" id="f-start"></div>
    <div class="field"><label>마감일</label><input type="date" id="f-end"></div>

      <button class="btn" onclick="document.getElementById('member-overlay').classList.remove('open')">취소</button>
      <button class="btn primary" onclick="saveMember()">저장</button>
    </div>

<script>
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbyVVsu9GpiBGMdjb5uU1NYNg0kMjNrDZ7yuyPSrFI2LOOZ0iC8La-71i8U8MjVykMo6/exec';
var TODAY = new Date();
var todayStr = TODAY.toISOString().slice(0,10);
document.getElementById('today-label').textContent = TODAY.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

var PALETTE = ['#44546E','#2563EB','#5C8A1E','#7C3AED','#D97706','#DC2626','#0891B2','#DB2777','#059669','#9333EA'];
var members = JSON.parse(localStorage.getItem('hr_members')||'null') || [
  {name:'김재용',role:'인사과장',color:'#44546E'},
  {name:'배지은',role:'인사담당',color:'#2563EB'},
  {name:'공지현',role:'인사담당',color:'#5C8A1E'},
  {name:'최필상',role:'인사담당',color:'#7C3AED'}
];
var curMonth = {y:TODAY.getFullYear(), m:TODAY.getMonth()};
var curForm = 'daily';
var editMemberIdx = null;
var editIdx = null;

// ── 데이터: 로컬백업 우선 로드 ──
var data = {daily:[], project:[], task:[], leave:[]};
(function loadLocalBackup(){
  try {
    var bk = localStorage.getItem('hr_data_backup');
    if(bk) {
      var parsed = JSON.parse(bk);
      if(parsed.daily) data.daily = parsed.daily;
      if(parsed.project) data.project = parsed.project;
      if(parsed.task) data.task = parsed.task;
      if(parsed.leave) data.leave = parsed.leave;
    }
  } catch(e) {}
})();

function saveLocalBackup(){
  try { localStorage.setItem('hr_data_backup', JSON.stringify(data)); } catch(e){}
}

function genId(p){ return p+Date.now(); }
function saveLocal(){ localStorage.setItem('hr_members', JSON.stringify(members)); }
function getMember(n){ return members.find(function(m){return m.name===n;})||{name:n,color:'#888',role:''}; }
function badge(s){ return '<span class="badge '+s+'">'+s+'</span>'; }
function mdot(name){ var m=getMember(name); return '<span class="mdot"><span class="mdot-c" style="background:'+m.color+'">'+name[0]+'</span>'+name+'</span>'; }
function isOverdue(e,s){ return e&&e<todayStr&&s!=='완료'; }
function isToday(e){ return e===todayStr; }

function getWeekKey(d){
  if(!d) return '';
  var dt=new Date(d);
  var j=new Date(dt.getFullYear(),0,1);
  return dt.getFullYear()+'-W'+String(Math.ceil(((dt-j)/86400000+j.getDay()+1)/7)).padStart(2,'0');
}
function getWeekLabel(d){
  if(!d) return '';
  var dt=new Date(d);
  var mon=new Date(dt); mon.setDate(dt.getDate()-dt.getDay()+1);
  var month=mon.getMonth()+1;
  var firstDay=new Date(mon.getFullYear(),mon.getMonth(),1);
  var weekOfMonth=Math.ceil((mon.getDate()+firstDay.getDay())/7);
  return dt.getFullYear()+'년 '+month+'월 '+weekOfMonth+'주차';
}

function formatDateVal(val){
  if(!val) return val;
  if(val instanceof Date){
    if(isNaN(val.getTime())) return '';
    return val.getFullYear()+'-'+String(val.getMonth()+1).padStart(2,'0')+'-'+String(val.getDate()).padStart(2,'0');
  }
  if(typeof val!=='string') return String(val);
  if(val.indexOf('GMT')>=0||val.indexOf('표준시')>=0){
    var d=new Date(val);
    if(!isNaN(d.getTime())) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  if(val.match(/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s/)){
    var d=new Date(val);
    if(!isNaN(d.getTime())) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  if(val.match(/^\d{4}-\d{2}-\d{2}T/)) return val.slice(0,10);
  var m=val.match(/^(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})$/);
  if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  return val;
}

function normalizeRow(row, tab){
  var dateFields=['end','endPlan','endActual','start','created','date'];
  var out={};
  Object.keys(row).forEach(function(k){
    if(!k||k==='') return;
    out[k]=dateFields.indexOf(k)>=0?formatDateVal(row[k]):row[k];
  });
  if(tab==='daily'){
    if(!('feedback' in out)) out.feedback='';
    if(!out.created) out.created=out.end||'';
  }
  return out;
}

function filterRows(rows){
  var seen={};
  return (rows||[]).filter(function(r){
    if(!r.id||r.id==='id'||r.member==='member'||r.id==='') return false;
    if(seen[r.id]) return false;
    seen[r.id]=true;
    return true;
  });
}

function setSyncStatus(t,txt){
  var b=document.getElementById('sync-btn');
  b.style.color=t==='ok'?'var(--lime)':t==='err'?'#FCA5A5':'var(--navy-mid)';
  b.textContent=txt;
}

// ── 구글시트 호출 (GET) ──
async function callScript(params){
  try{
    var url=SHEET_URL+'?';
    Object.keys(params).forEach(function(k){
      url+=k+'='+encodeURIComponent(typeof params[k]==='object'?JSON.stringify(params[k]):params[k])+'&';
    });
    url+='t='+Date.now();
    var r=await fetch(url,{redirect:'follow',mode:'cors'});
    if(!r.ok) return null;
    var txt=await r.text();
    try{ return JSON.parse(txt); }catch(e){ return null; }
  }catch(e){ return null; }
}

// ── overwrite: POST 방식 (URL 길이 제한 해결) ──
async function overwriteTab(tab){
  var rows=data[tab]||[];
  // 중복 id 제거
  var seen={};
  rows=rows.filter(function(r){
    if(!r.id||seen[r.id]) return false;
    seen[r.id]=true;
    return true;
  });
  // 날짜 필드 정규화 (GMT 문자열 방지)
  var dateFields=['end','start','created','date'];
  rows=rows.map(function(r){
    var out={}; Object.keys(r).forEach(function(k){ out[k]=dateFields.indexOf(k)>=0?formatDateVal(r[k]):r[k]; }); return out;
  });
  data[tab]=rows;
  saveLocalBackup(); // 로컬 백업 항상 저장

  if(!rows.length){
    // 빈 배열 → GET으로 처리
    try{
      var url=SHEET_URL+'?action=overwrite&tab='+tab+'&rows='+encodeURIComponent('[]')+'&t='+Date.now();
      await fetch(url,{redirect:'follow',mode:'cors'});
    }catch(e){}
    return;
  }

  // POST로 전송
  var headers=Object.keys(rows[0]);
  var dataRows=rows.map(function(r){ return headers.map(function(h){ return r[h]||''; }); });
  try{
    await fetch(SHEET_URL, {
      method:'POST',
      mode:'cors',
      redirect:'follow',
      headers:{'Content-Type':'text/plain'}, // Apps Script CORS 우회
      body: JSON.stringify({action:'overwrite', tab:tab, rows:dataRows})
    });
  }catch(e){
    // POST 실패시 GET fallback (소량 데이터)
    try{
      await callScript({action:'overwrite', tab:tab, rows:dataRows});
    }catch(e2){}
  }
  setSyncStatus('ok','● 저장됨');
}

// ── append: 새 행 추가 ──
async function saveRow(tab, row){
  try{
    var cleanRow=row.map(function(v){
      if(v&&typeof v==='string'&&v.indexOf('GMT')>=0){ var d=new Date(v); if(!isNaN(d.getTime())) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
      return v;
    });
    // POST append
    try{
      await fetch(SHEET_URL, {
        method:'POST',
        mode:'cors',
        redirect:'follow',
        headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({action:'append', tab:tab, row:cleanRow})
      });
    }catch(e){
      // fallback to GET
      await callScript({action:'append', tab:tab, row:cleanRow});
    }
    saveLocalBackup();
    setSyncStatus('ok','● 저장됨');
  }catch(e){ setSyncStatus('err','⚠ 저장 실패'); }
}

// ── 전체 동기화 ──
async function syncAll(){
  setSyncStatus('loading','⟳ 동기화 중...');
  try{
    var d=await callScript({tab:'daily'});
    var p=await callScript({tab:'project'});
    var lv=await callScript({tab:'leave'});
    var tk=await callScript({tab:'task'});

    var fd=filterRows(d).map(function(r){return normalizeRow(r,'daily');});
    var fp=filterRows(p).map(function(x){ x=normalizeRow(x,'project'); x.progress=parseInt(x.progress)||0; return x; });
    var flv=filterRows(lv).map(function(r){return normalizeRow(r,'leave');});
    var ftk=filterRows(tk).map(function(r){return normalizeRow(r,'task');});

    // 시트에 데이터 있을 때만 교체 (빈 배열이면 기존 로컬 데이터 유지)
    if(fd.length) data.daily=fd;
    if(fp.length) data.project=fp;
    if(flv.length) data.leave=flv;
    if(ftk.length) data.task=ftk;

    saveLocalBackup();
    setSyncStatus('ok','● 동기화 완료 ('+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})+')');
    renderAll();
  }catch(e){
    setSyncStatus('err','⚠ 오류 (로컬 데이터 표시 중)');
    renderAll();
  }
}

function updateStats(){
  document.getElementById('s-total').textContent=data.daily.length+data.project.length;
  document.getElementById('s-prog').textContent=data.daily.filter(function(x){return x.status==='진행';}).length;
  document.getElementById('s-due').textContent=data.daily.filter(function(x){return isToday(x.end)&&x.status!=='완료';}).length;
  document.getElementById('s-done').textContent=data.daily.filter(function(x){return x.status==='완료';}).length;
  document.getElementById('badge-daily').textContent=data.daily.filter(function(x){return x.status==='진행';}).length;
}

function renderMemberUI(){
  document.getElementById('topbar-staff').innerHTML=members.map(function(m){ return '<div class="t-avatar" style="background:'+m.color+'" title="'+m.name+'">'+m.name[0]+'</div>'; }).join('');
  document.getElementById('member-nav-list').innerHTML=members.map(function(m){ return '<div class="member-nav" onclick="filterByMember(\''+m.name+'\',this)"><span class="mdot-c" style="background:'+m.color+';width:20px;height:20px;font-size:10px">'+m.name[0]+'</span>'+m.name+'</div>'; }).join('');
  var sel=document.getElementById('filter-member'); var cur=sel.value;
  sel.innerHTML='<option value="">전체 담당자</option>'+members.map(function(m){ return '<option'+(m.name===cur?' selected':'')+'>'+m.name+'</option>'; }).join('');
  ['filter-weekly-member','filter-proj-member'].forEach(function(id){
    var el=document.getElementById(id); if(!el) return;
    var c=el.value;
    el.innerHTML='<option value="">전체 담당자</option>'+members.map(function(m){ return '<option'+(m.name===c?' selected':'')+'>'+m.name+'</option>'; }).join('');
  });
}

function renderMemberGrid(){
  document.getElementById('member-grid').innerHTML=members.map(function(m,i){
    return '<div class="member-card"><div class="member-big-av" style="background:'+m.color+'">'+m.name[0]+'</div><div style="flex:1"><div style="font-size:14px;font-weight:600">'+m.name+'</div><div style="font-size:11px;color:var(--text-muted)">'+(m.role||'')+'</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px">진행 '+data.daily.filter(function(x){return x.member===m.name&&x.status==='진행';}).length+'건</div><div style="display:flex;gap:4px;margin-top:6px"><button class="sm-btn" onclick="openEditMember('+i+')">✏️ 수정</button>'+(members.length>1?'<button class="sm-btn del" onclick="deleteMember('+i+')">삭제</button>':'')+'</div></div></div>';
  }).join('')+'<div class="add-member-card" onclick="openAddMember()"><span style="font-size:20px">+</span><span>팀원 추가</span></div>';
}

function openEditMember(i){ editMemberIdx=i; var m=members[i]; document.getElementById('member-modal-title').textContent='팀원 수정'; document.getElementById('m-name').value=m.name; document.getElementById('m-role').value=m.role||''; renderColorPicker(m.color); document.getElementById('member-overlay').classList.add('open'); }
function openAddMember(){ editMemberIdx=null; document.getElementById('member-modal-title').textContent='팀원 추가'; document.getElementById('m-name').value=''; document.getElementById('m-role').value=''; renderColorPicker(PALETTE[members.length%PALETTE.length]); document.getElementById('member-overlay').classList.add('open'); }
function renderColorPicker(sel){ document.getElementById('color-picker-row').innerHTML=PALETTE.map(function(c){ return '<div class="color-dot'+(c===sel?' selected':'')+'" style="background:'+c+'" onclick="selectColor(\''+c+'\',this)"></div>'; }).join(''); }
function selectColor(c,el){ document.querySelectorAll('.color-dot').forEach(function(d){d.classList.remove('selected');}); el.classList.add('selected'); }
function getSelectedColor(){ var el=document.querySelector('.color-dot.selected'); return el?el.style.background:PALETTE[0]; }
function saveMember(){
  var name=document.getElementById('m-name').value.trim();
  var role=document.getElementById('m-role').value.trim();
  var color=getSelectedColor();
  if(!name){alert('이름을 입력해주세요');return;}
  if(editMemberIdx===null){ members.push({name:name,role:role,color:color}); }
  else{ var old=members[editMemberIdx].name; members[editMemberIdx]={name:name,role:role,color:color}; if(old!==name){['daily','project'].forEach(function(k){data[k].forEach(function(x){if(x.member===old)x.member=name;});});} }
  saveLocal(); document.getElementById('member-overlay').classList.remove('open'); renderAll();
}
function deleteMember(i){ if(!confirm(members[i].name+' 팀원을 삭제할까요?'))return; members.splice(i,1); saveLocal(); renderAll(); }

function saveHeadcount(){ var v=document.getElementById('headcount-input').value; localStorage.setItem('hr_headcount',v); document.getElementById('headcount-display').textContent=v; alert('저장됐어요!'); }
function loadHeadcount(){ var v=localStorage.getItem('hr_headcount')||'266'; document.getElementById('headcount-display').textContent=v; document.getElementById('headcount-input').value=v; }

function editItem(type,idx){
  var x=data[type][idx]; editIdx=idx; curForm=type;
  var titles={daily:'일일 업무 수정',project:'프로젝트 수정'};
  document.getElementById('modal-title').textContent=titles[type];
  document.getElementById('field-start').style.display=type==='project'?'block':'none';
  document.getElementById('field-created').style.display=(type==='daily')?'block':'none';
  document.getElementById('field-progress').style.display=type==='project'?'block':'none';
  document.getElementById('f-member').innerHTML=members.map(function(m){return '<option>'+m.name+'</option>';}).join('');
  setTimeout(function(){
    document.getElementById('f-member').value=x.member||'';
    document.getElementById('f-content').value=x.content||x.name||'';
    document.getElementById('f-created').value=x.start||x.created||todayStr;
    document.getElementById('f-end').value=x.end||'';
    document.getElementById('f-start').value=x.start||'';
    document.getElementById('f-status').value=x.status||'진행';
    document.getElementById('f-note').value=x.note||'';
    document.getElementById('f-progress').value=x.progress||0;
  },50);
  document.getElementById('save-btn').textContent='수정 완료';
  document.getElementById('overlay').classList.add('open');
}

async function deleteItem(type,idx){
  var x=data[type][idx];
  if(!confirm('['+(x.content||x.name)+']을 삭제할까요?'))return;
  data[type].splice(idx,1);
  await overwriteTab(type);
  renderAll();
}

function renderDaily(){
  var fm=document.getElementById('filter-member').value;
  var fs=document.getElementById('filter-status').value;
  var rows=data.daily.filter(function(x){return(!fm||x.member===fm)&&(!fs||x.status===fs);});
  if(!rows.length){document.getElementById('daily-tbody').innerHTML='<tr><td colspan="8" class="empty">업무가 없습니다</td></tr>';return;}
  var html='';
  rows.forEach(function(x){
    var di=data.daily.indexOf(x);
    var due=isToday(x.end)&&x.status!=='완료';
    var over=isOverdue(x.end,x.status);
    // 시작일: start 우선, 없으면 created
    var startVal = x.start || x.created || '';
    html+='<tr>';
    html+='<td><input type="checkbox" class="row-check" data-id="'+x.id+'" style="cursor:pointer"></td>';
    html+='<td style="font-weight:500;color:'+(over?'#DC2626':due?'#D97706':'inherit')+'">'+x.content+(due?' 🔔':over?' ⚠️':'')+'</td>';
    html+='<td>'+mdot(x.member)+'</td>';
    html+='<td style="font-size:12px;color:var(--text-muted)">'+startVal+'</td>';
    html+='<td style="font-size:12px;color:'+(over?'#DC2626':due?'#D97706':x.status==='완료'?'var(--text-muted)':'inherit')+'">'+(x.end||'')+'</td>';
    html+='<td>'+badge(x.status)+'</td>';
    html+='<td style="font-size:12px;color:var(--text-muted);white-space:pre-wrap">'+(x.note||'')+'</td>';
    html+='<td><div class="action-btns">';
    html+='<select onchange="changeStatus(\'daily\','+di+',this.value)" style="font-size:11px;padding:2px 4px;border:1px solid var(--gray-border);border-radius:4px">';
    ['진행','완료','대기','피드백','보류'].forEach(function(s){ html+='<option'+(x.status===s?' selected':'')+'>'+s+'</option>'; });
    html+='</select>';
    html+='<button class="edit-btn" onclick="editItem(\'daily\','+di+')">✏️</button>';
    html+='<button class="del-btn" onclick="deleteItem(\'daily\','+di+')">🗑️</button>';
    html+='</div></td></tr>';
  });
  document.getElementById('daily-tbody').innerHTML=html;
}

function renderWeeklySelect(){
  var weeks={};
  data.daily.forEach(function(x){ var d=x.start||x.created; if(!d)return; var k=getWeekKey(d); if(!weeks[k])weeks[k]=getWeekLabel(d); });
  data.leave.forEach(function(x){ var d=x.date; if(!d)return; var k=getWeekKey(d); if(!weeks[k])weeks[k]=getWeekLabel(d); });
  (data.task||[]).forEach(function(x){ var d=x.start; if(!d)return; var k=getWeekKey(d); if(!weeks[k])weeks[k]=getWeekLabel(d); });
  var sel=document.getElementById('week-select'); var cur=sel.value;
  var opts=Object.entries(weeks).sort(function(a,b){return a[0]>b[0]?-1:1;});
  sel.innerHTML=opts.map(function(e){return '<option value="'+e[0]+'">'+e[1]+'</option>';}).join('');
  if(cur&&opts.some(function(o){return o[0]===cur;})){ sel.value=cur; }
  else{ var tw=getWeekKey(todayStr); var found=opts.find(function(o){return o[0]===tw;}); sel.value=found?found[0]:(opts.length?opts[0][0]:''); }
}

// 인라인 폼에서 단계 저장
async function saveTaskInline(projId){
  var content2=document.getElementById('tf-content-'+projId).value.trim();
  if(!content2){alert('단계명을 입력해주세요');return;}
  var memberVal=document.getElementById('tf-member-'+projId).value;
  var noteVal=document.getElementById('tf-note-'+projId).value;
  var startVal=document.getElementById('tf-start-'+projId).value;
  var endVal=document.getElementById('tf-end-'+projId).value;
  var editId=document.getElementById('tf-editid-'+projId).value;
  var statusEl=document.getElementById('tf-status-'+projId);
  var statusVal=statusEl?statusEl.value:'대기';

  if(editId){
    // 수정
    var t=data.task.find(function(x){return x.id===editId;});
    if(t){t.content=content2;t.member=memberVal;t.note=noteVal;t.start=startVal;t.end=endVal;t.status=statusVal;}
    await overwriteTab('task');
  } else {
    // 신규
    var existing=data.task.filter(function(t){return t.projectId===projId;});
    var maxStep=existing.reduce(function(mx,t){return Math.max(mx,parseInt(t.step||0));},0);
    var nr={id:genId('tk'),projectId:projId,step:String(maxStep+1),content:content2,member:memberVal,start:startVal,end:endVal,status:statusVal,note:noteVal};
    data.task.push(nr);
    await saveRow('task',Object.values(nr));
  }
  cancelTaskForm(projId);
  await recalcProgress(projId);
  // renderProject 후 해당 카드 다시 열기 + 폼 표시 유지
  renderProject();
  setTimeout(function(){
    var filtered=data.project.filter(function(x){
      var fm=document.getElementById('filter-proj-member').value;
      var fs=document.getElementById('filter-proj-status').value;
      return(!fm||x.member===fm)&&(!fs||x.status===fs);
    });
    var proj=data.project.find(function(p){return p.id===projId;});
    var idx=filtered.indexOf(proj);
    var cards=document.querySelectorAll('#project-list > div');
    if(idx>=0&&cards[idx]){
      var body=cards[idx].children[1];
      var arrow=cards[idx].querySelector('span');
      if(body){body.style.display='block';}
      if(arrow){arrow.style.transform='rotate(90deg)';}
    }
  },100);
}

function openTaskEditForm(taskId, projId){
  var t=data.task.find(function(x){return x.id===taskId;});
  if(!t) return;
  // 폼 열기
  var form=document.getElementById('task-form-'+projId);
  if(form) form.style.display='block';
  document.getElementById('tf-content-'+projId).value=t.content;
  document.getElementById('tf-member-'+projId).value=t.member;
  document.getElementById('tf-note-'+projId).value=t.note||'';
  document.getElementById('tf-start-'+projId).value=t.start;
  document.getElementById('tf-end-'+projId).value=t.end;
  document.getElementById('tf-editid-'+projId).value=t.id;
  var statusEl2=document.getElementById('tf-status-'+projId);
  if(statusEl2) statusEl2.value=t.status||'대기';
  document.getElementById('tf-title-'+projId).textContent='✏️ 단계 수정';
  document.getElementById('tf-cancel-'+projId).style.display='';
  document.getElementById('tf-content-'+projId).focus();
  document.getElementById('tf-content-'+projId).scrollIntoView({behavior:'smooth',block:'nearest'});
}

function cancelTaskForm(projId){
  document.getElementById('tf-content-'+projId).value='';
  document.getElementById('tf-note-'+projId).value='';
  document.getElementById('tf-start-'+projId).value=todayStr;
  document.getElementById('tf-end-'+projId).value=todayStr;
  document.getElementById('tf-editid-'+projId).value='';
  document.getElementById('tf-title-'+projId).textContent='+ 단계 추가';
  document.getElementById('tf-cancel-'+projId).style.display='none';
  // 폼 숨기기 + 버튼 텍스트 복원
  var f=document.getElementById('task-form-'+projId);
  if(f) f.style.display='none';
}

// 진행률 재계산 후 저장
async function recalcProgress(projId){
  var proj=data.project.find(function(p){return p.id===projId;});
  if(!proj) return;
  var tasks=data.task.filter(function(t){return t.projectId===projId;});
  var total=tasks.length;
  var done=tasks.filter(function(t){return t.status==='완료';}).length;
  proj.progress=total>0?Math.round(done/total*100):0;
  proj.status=proj.progress===100?'완료':proj.progress>0?'진행':'대기';
  await overwriteTab('project');
  updateStats();
}

async function toggleTaskDone(cb, taskId, projId){
  var t=data.task.find(function(x){return x.id===taskId;});
  if(!t) return;
  t.status=cb.checked?'완료':'진행';
  await overwriteTab('task');
  await recalcProgress(projId);
  renderProject();
  // 해당 카드 열린 상태 유지
  setTimeout(function(){
    var filtered=data.project.filter(function(x){
      var fm=document.getElementById('filter-proj-member').value;
      var fs=document.getElementById('filter-proj-status').value;
      return(!fm||x.member===fm)&&(!fs||x.status===fs);
    });
    var proj=data.project.find(function(p){return p.id===projId;});
    var idx=filtered.indexOf(proj);
    var cards=document.querySelectorAll('#project-list > div');
    if(idx>=0&&cards[idx]){
      var body=cards[idx].querySelector('div:nth-child(2)');
      var arrow=cards[idx].querySelector('span');
      if(body){body.style.display='block';}
      if(arrow){arrow.style.transform='rotate(90deg)';}
    }
  },50);
}

async function deleteTask(taskId, projId){
  if(!confirm('이 단계를 삭제할까요?')) return;
  data.task=data.task.filter(function(t){return t.id!==taskId;});
  await overwriteTab('task');
  await recalcProgress(projId);
  renderProject();
  setTimeout(function(){
    var filtered=data.project.filter(function(x){
      var fm=document.getElementById('filter-proj-member').value;
      var fs=document.getElementById('filter-proj-status').value;
      return(!fm||x.member===fm)&&(!fs||x.status===fs);
    });
    var proj=data.project.find(function(p){return p.id===projId;});
    var idx=filtered.indexOf(proj);
    var cards=document.querySelectorAll('#project-list > div');
    if(idx>=0&&cards[idx]){
      var body=cards[idx].querySelector('div:nth-child(2)');
      var arrow=cards[idx].querySelector('span');
      if(body){body.style.display='block';}
      if(arrow){arrow.style.transform='rotate(90deg)';}
    }
  },50);
}

function closeOverlay(){ document.getElementById('overlay').classList.remove('open'); editIdx=null; document.getElementById('save-btn').textContent='저장'; document.getElementById('save-btn').disabled=false; }
function closeOverlayOutside(e){ if(e.target===document.getElementById('overlay'))closeOverlay(); }

async function saveForm(){
  var btn=document.getElementById('save-btn');
  if(btn.disabled)return;
  btn.disabled=true; btn.textContent='저장 중...';
  var member=document.getElementById('f-member').value;
  var content=document.getElementById('f-content').value.trim();
  var end=document.getElementById('f-end').value;
  var status=document.getElementById('f-status').value;
  var note=document.getElementById('f-note').value;
  if(!content){alert('내용을 입력해주세요');btn.disabled=false;btn.textContent='저장';return;}

  if(editIdx!==null){
    var x=data[curForm][editIdx];
    if(curForm==='daily'){
      x.member=member; x.content=content;
      x.created=document.getElementById('f-created').value||todayStr;
      x.end=end; x.status=status; x.note=note;
    } else if(curForm==='project'){
      x.member=member; x.name=content;
      x.start=document.getElementById('f-start').value;
      x.end=end; x.status=status;
      x.progress=parseInt(document.getElementById('f-progress').value)||0;
      x.note=note;
    }
    await overwriteTab(curForm);
    closeOverlay(); renderAll(); return;
  }

  if(curForm==='daily'){
    var startVal=document.getElementById('f-created').value||todayStr;
    var nr={id:genId('d'),member:member,content:content,created:startVal,end:end,status:status,note:note,feedback:''};
    data.daily.push(nr);
    await saveRow('daily',Object.values(nr));
  } else if(curForm==='project'){
    var nr={id:genId('p'),name:content,member:member,start:document.getElementById('f-start').value,end:end,progress:parseInt(document.getElementById('f-progress').value)||0,status:status,note:note};
    data.project.push(nr);
    await saveRow('project',Object.values(nr));
  }
  closeOverlay(); renderAll();
}

function renderCalendar(){
  var y=curMonth.y; var m=curMonth.m;
  document.getElementById('cal-month-label').textContent=y+'년 '+(m+1)+'월';
  var first=new Date(y,m,1); var last=new Date(y,m+1,0);
  var allEvts=data.daily.map(function(x){return{date:x.end,label:x.content.slice(0,14),type:x.status};})
    .concat(data.leave.map(function(x){return{date:formatDateVal(x.date),label:'[휴가]'+x.member+' '+x.type,type:'휴가'};}));
  var html='';
  for(var i=0;i<first.getDay();i++) html+='<div class="cal-day other-month"></div>';
  for(var dd=1;dd<=last.getDate();dd++){
    var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
    var evts=allEvts.filter(function(x){return x.date===ds;});
    var clickAttr=evts.length?'style="cursor:pointer"':'';
    html+='<div class="cal-day '+(ds===todayStr?'today':'')+'" '+clickAttr+(evts.length?' data-ds="'+ds+'"':'')+'>';
      '<div class="day-num">'+dd+'</div>'+
      evts.slice(0,2).map(function(e){return '<div class="cal-evt '+e.type+'">'+e.label+'</div>';}).join('')+
      (evts.length>2?'<div style="font-size:10px;color:var(--navy);font-weight:600;margin-top:2px">+'+(evts.length-2)+'건 더보기</div>':'')+
      '</div>';
  }
  document.getElementById('cal-grid').innerHTML=html;
  document.querySelectorAll('.cal-day[data-ds]').forEach(function(el){
    el.addEventListener('click',function(){showCalModal(this.getAttribute('data-ds'));});
  });
}

function showCalModal(ds){
  var allEvts=data.daily.map(function(x){return{date:x.end,label:x.content,type:x.status,member:x.member,note:x.note||''};})
    .concat(data.leave.map(function(x){return{date:formatDateVal(x.date),label:'[휴가] '+x.type,type:'휴가',member:x.member,note:x.note||''};}));
  var evts=allEvts.filter(function(x){return x.date===ds;});
  document.getElementById('cal-modal-title').textContent=ds+' 일정 ('+evts.length+'건)';
  document.getElementById('cal-modal-body').innerHTML=evts.length===0?'<div class="empty">일정이 없습니다</div>':evts.map(function(e){
    return '<div style="padding:.75rem 1rem;border:.5px solid var(--gray-border);border-radius:var(--radius)"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-weight:600;font-size:13px">'+e.label+'</span>'+badge(e.type)+'</div><div style="font-size:12px;color:var(--text-muted)">담당자: '+mdot(e.member)+(e.note?' · '+e.note:'')+'</div></div>';
  }).join('');
  document.getElementById('cal-overlay').classList.add('open');
}

function renderGantt(){
  var fm=document.getElementById('filter-proj-member')?document.getElementById('filter-proj-member').value:'';
  var fs=document.getElementById('filter-proj-status')?document.getElementById('filter-proj-status').value:'';
  var filteredProjects=data.project.filter(function(x){return(!fm||x.member===fm)&&(!fs||x.status===fs);});
  var refStart=new Date(curMonth.y,curMonth.m,1); var days=new Date(curMonth.y,curMonth.m+1,0).getDate();
  var lbl=document.getElementById('gantt-month-label'); if(lbl) lbl.textContent=curMonth.y+'년 '+(curMonth.m+1)+'월';
  var todayOff=(TODAY-refStart)/86400000; var todayPct=Math.min(100,Math.max(0,todayOff/days*100));
  var html='<div style="display:flex;padding:.4rem 0;border-bottom:1px solid var(--gray-border);margin-bottom:4px"><div style="min-width:160px;font-size:10px;font-weight:600;color:var(--text-muted)">프로젝트</div><div style="display:flex;flex:1">';
  for(var d=1;d<=days;d+=3) html+='<div style="flex:3;text-align:center;font-size:9px;color:var(--text-muted)">'+d+'</div>';
  html+='</div></div>';
  filteredProjects.forEach(function(p){
    if(!p.start||!p.end)return;
    var s=(new Date(p.start)-refStart)/86400000; var e=(new Date(p.end)-refStart)/86400000;
    var left=Math.max(0,s)/days*100; var width=(Math.min(days,e)-Math.max(0,s))/days*100;
    var m=getMember(p.member);
    html+='<div class="gantt-row"><div style="min-width:160px;font-size:12px;padding:.25rem 0">'+p.name+'<br><span style="font-size:10px;color:var(--text-muted)">'+p.member+'</span></div><div style="flex:1;position:relative;height:20px;margin:.6rem 0"><div class="g-today" style="left:'+todayPct.toFixed(1)+'%"></div><div class="g-bar" style="left:'+left.toFixed(1)+'%;width:'+Math.max(width,1).toFixed(1)+'%;background:'+m.color+'"></div></div></div>';
  });
  if(!filteredProjects.filter(function(p){return p.start&&p.end;}).length) html+='<div class="empty" style="padding:1rem">프로젝트가 없습니다</div>';
  document.getElementById('gantt-area').innerHTML=html;
}

function updateProgress(i,val){
  data.project[i].progress=Math.min(100,Math.max(0,parseInt(val)||0));
  data.project[i].status=data.project[i].progress>=100?'완료':'진행';
  setTimeout(function(){overwriteTab('project');},500);
  renderProject(); updateStats();
}

  updateStats(); renderMemberUI(); renderDaily();
  renderWeeklySelect(); renderWeekly();
  renderProject(); renderCalendar();
}
